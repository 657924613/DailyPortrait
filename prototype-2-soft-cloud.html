<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DailyPortrait · Soft Cloud</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #F4F1EC;
    --bg-2: #EDE8E0;
    --card: #FFFFFF;
    --primary: #FF8A5B;
    --primary-soft: rgba(255,138,91,0.12);
    --primary-2: #F76C3A;
    --green: #4CC38A;
    --red: #F26B5E;
    --text: #2A2A35;
    --text-2: #76727A;
    --outline: rgba(0,0,0,0.06);
    --outline-strong: rgba(0,0,0,0.18);
    --focus-ring: #FF8A5B;
    --radius-card: 24px;
    --radius-btn: 16px;
    --shadow-1: 0 4px 16px rgba(122, 92, 60, 0.08);
    --shadow-2: 0 24px 60px rgba(122, 92, 60, 0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "SF Pro Text", "PingFang SC", system-ui, sans-serif;
    background:
      radial-gradient(circle at 10% 20%, rgba(255,200,170,0.45) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(180,210,255,0.4) 0%, transparent 40%),
      linear-gradient(135deg, #F8F4EE 0%, #EFE6DA 100%);
    color: var(--text); min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 32px 16px; gap: 32px;
  }
  button:focus-visible, [role="button"]:focus-visible, [role="tab"]:focus-visible {
    outline: 2px solid var(--focus-ring); outline-offset: 2px;
  }
  .phone {
    width: 390px; height: 844px; background: var(--bg);
    border-radius: 48px; border: 8px solid #1a1a1a;
    box-shadow: 0 24px 60px rgba(122, 92, 60, 0.25);
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .notch {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 30px; background: #1a1a1a; border-radius: 18px; z-index: 100;
  }
  .screen { width: 100%; height: 100%; overflow: hidden; position: relative; }
  .status-bar {
    height: 50px; padding: 16px 28px 0; display: flex;
    justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600;
  }
  /* Bottom tab — pill style */
  .tab-bar {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
    border-radius: 999px; padding: 6px; display: flex; gap: 4px;
    box-shadow: var(--shadow-1); border: 1px solid var(--outline);
  }
  .tab-item {
    border: none; background: transparent; cursor: pointer; border-radius: 999px;
    padding: 10px 18px; display: flex; align-items: center; gap: 8px;
    color: var(--text-2); font-size: 13px; font-weight: 600; min-height: 44px;
  }
  .tab-item.active { background: var(--primary); color: #fff; box-shadow: var(--shadow-1); }
  .tab-item svg { width: 18px; height: 18px; }
  /* ============ Dashboard ============ */
  .dash-page { padding: 60px 20px 110px; height: 100%; overflow-y: auto; }
  .dash-header { padding: 12px 4px 20px; display: flex; justify-content: space-between; align-items: flex-end; }
  .dash-greet { font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
  .dash-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    box-shadow: var(--shadow-1);
  }
  .empty-state {
    background: var(--card); border-radius: var(--radius-card);
    padding: 48px 24px; text-align: center; box-shadow: var(--shadow-1);
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .empty-icon {
    width: 96px; height: 96px; border-radius: 50%;
    background: linear-gradient(135deg, #FFE4D4, #FFC9AC);
    display: flex; align-items: center; justify-content: center; font-size: 44px;
  }
  .empty-text { font-size: 16px; color: var(--text-2); line-height: 1.6; }
  .empty-text strong { color: var(--text); display: block; font-size: 18px; margin-bottom: 6px; }
  .cta-primary {
    padding: 16px 28px; border-radius: var(--radius-btn); border: none;
    background: var(--primary); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    box-shadow: 0 8px 20px rgba(255,138,91,0.35); min-height: 48px; min-width: 48px;
  }
  /* Grid */
  .bento { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .card {
    background: var(--card); border-radius: var(--radius-card); padding: 18px;
    box-shadow: var(--shadow-1);
  }
  .today-card {
    grid-column: span 2; padding: 22px; display: flex; gap: 16px; align-items: center;
    background: linear-gradient(135deg, #FFF4EC 0%, #FFE3D1 100%);
  }
  .today-thumb-placeholder {
    width: 88px; height: 88px; border-radius: 22px;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    display: flex; align-items: center; justify-content: center; font-size: 38px;
    box-shadow: 0 8px 16px rgba(255,138,91,0.3); flex-shrink: 0;
  }
  .today-info { flex: 1; }
  .today-label { font-size: 12px; color: var(--text-2); margin-bottom: 4px; font-weight: 500; }
  .today-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .today-time {
    font-size: 12px; color: var(--primary-2); font-weight: 600;
    background: var(--primary-soft); padding: 4px 10px; border-radius: 999px;
    display: inline-block;
  }
  .streak-card { display: flex; flex-direction: column; align-items: center; padding: 20px 16px; background: linear-gradient(180deg, #FFF8F0, #FFEFD8); }
  .streak-emoji { font-size: 36px; margin-bottom: 6px; }
  .streak-num {
    font-size: 32px; font-weight: 800; line-height: 1;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .streak-label { font-size: 11px; color: var(--text-2); margin-top: 6px; font-weight: 500; }
  .week-card { padding: 18px 16px; background: linear-gradient(180deg, #F0F6FF, #DCE9FB); }
  .week-title { font-size: 13px; color: var(--text-2); margin-bottom: 12px; font-weight: 600; }
  .week-dots { display: flex; justify-content: space-between; }
  .day-dot {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600;
    background: rgba(0,0,0,0.05); color: var(--text-2);
  }
  .day-dot.done { background: var(--primary); color: #fff; }
  .day-dot.today { background: #fff; border: 2px solid var(--primary); color: var(--primary); }
  .history-section { margin-top: 22px; }
  .history-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; padding-left: 4px; }
  .history-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .hist-item {
    aspect-ratio: 1; border-radius: 18px; position: relative; overflow: hidden;
    box-shadow: var(--shadow-1);
    display: flex; align-items: flex-end; padding: 8px;
  }
  .hist-item:nth-child(6n+1) { background: linear-gradient(135deg, #FFE4D4, #FFC9AC); }
  .hist-item:nth-child(6n+2) { background: linear-gradient(135deg, #DCE9FB, #B5CDF5); }
  .hist-item:nth-child(6n+3) { background: linear-gradient(135deg, #E4F4DC, #C9E8B6); }
  .hist-item:nth-child(6n+4) { background: linear-gradient(135deg, #F5DCFB, #D8B5E8); }
  .hist-item:nth-child(6n+5) { background: linear-gradient(135deg, #FFF4DC, #FFE5A8); }
  .hist-item:nth-child(6n+6) { background: linear-gradient(135deg, #FFD4E4, #F5A0B8); }
  .hist-date {
    font-size: 11px; color: var(--text); padding: 4px 8px;
    background: rgba(255,255,255,0.7); backdrop-filter: blur(6px); border-radius: 8px; font-weight: 600;
  }
  /* Sheet */
  .sheet-backdrop {
    position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
    display: flex; align-items: flex-end;
  }
  .sheet {
    width: 100%; background: var(--card); border-radius: 28px 28px 0 0;
    padding: 24px 24px 40px;
  }
  .sheet-handle {
    width: 40px; height: 4px; background: var(--outline-strong); border-radius: 2px;
    margin: 0 auto 20px;
  }
  .sheet-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .sheet-desc { font-size: 14px; color: var(--text-2); margin-bottom: 24px; }
  .progress-track { height: 10px; background: var(--bg-2); border-radius: 999px; overflow: hidden; margin-bottom: 8px; }
  .progress-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--primary), var(--primary-2));
    transition: width 0.3s;
  }
  .progress-text { font-size: 13px; color: var(--text-2); margin-bottom: 20px; }
  .sheet-done-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, var(--green), #38A56F);
    display: flex; align-items: center; justify-content: center; font-size: 36px; color: #fff;
    margin: 0 auto 16px; box-shadow: 0 8px 24px rgba(76,195,138,0.35);
  }
  /* ============ Camera ============ */
  .cam-page { width: 100%; height: 100%; background: #1a1a1a; position: relative; overflow: hidden; }
  .cam-viewfinder {
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, #2a2a30 0%, #0a0a10 100%);
  }
  .face-mockup {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 120px; opacity: 0.3;
  }
  .guide-ring {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 280px; height: 360px; border-radius: 50%;
    border: 3px dashed rgba(255,255,255,0.45);
  }
  .guide-ring.misaligned { border: 4px solid var(--red); border-style: solid; }
  .guide-ring.aligned { border: 4px solid var(--green); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(76,195,138,0.6); }
    50% { box-shadow: 0 0 0 18px rgba(76,195,138,0); }
  }
  .ring-icon {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700;
  }
  .ring-icon.red { background: var(--red); color: #fff; }
  .ring-icon.green { background: var(--green); color: #fff; }
  /* Onion skin */
  .onion-overlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 280px; height: 360px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,138,91,0.4) 0%, rgba(255,138,91,0.1) 70%);
    opacity: 0.55; filter: blur(2px);
  }
  .onion-control {
    position: absolute; bottom: 220px; left: 24px; right: 24px;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); padding: 14px 18px;
    border-radius: 16px; box-shadow: var(--shadow-2);
  }
  .onion-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .onion-label { font-size: 13px; font-weight: 600; color: var(--text); }
  .onion-value { font-size: 13px; color: var(--primary); font-weight: 700; }
  .slider-track { height: 4px; background: var(--bg-2); border-radius: 2px; position: relative; }
  .slider-fill { height: 100%; background: var(--primary); border-radius: 2px; width: 60%; }
  .slider-thumb {
    position: absolute; top: 50%; left: 60%; transform: translate(-50%, -50%);
    width: 20px; height: 20px; border-radius: 50%; background: #fff;
    border: 3px solid var(--primary); box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .cam-topbar {
    position: absolute; top: 50px; left: 0; right: 0; padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center; z-index: 10;
  }
  .cam-iconbtn {
    width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px); border: none; color: var(--text); font-size: 18px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: var(--shadow-1);
  }
  .thumb-corner {
    position: absolute; top: 56px; right: 16px; width: 56px; height: 56px;
    border-radius: 16px; border: 3px solid #fff; overflow: hidden; z-index: 10;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    display: flex; align-items: center; justify-content: center; font-size: 24px;
    animation: thumbpop 0.4s ease;
    box-shadow: var(--shadow-2);
  }
  @keyframes thumbpop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .shutter-row {
    position: absolute; bottom: 60px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 60px;
  }
  .shutter {
    width: 78px; height: 78px; border-radius: 50%;
    background: #fff; border: 5px solid rgba(255,255,255,0.4);
    cursor: pointer; box-shadow: 0 0 0 0 rgba(255,255,255,0.15);
    min-width: 48px; min-height: 48px;
  }
  .shutter::after {
    content: ""; display: block; width: 100%; height: 100%; border-radius: 50%;
    background: var(--primary); transform: scale(0.85); transition: transform 0.15s;
  }
  .shutter:active::after { transform: scale(0.7); }
  .switch-btn {
    width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.2);
    border: none; color: #fff; font-size: 22px; cursor: pointer;
    backdrop-filter: blur(10px);
  }
  .perm-card {
    position: absolute; top: 50%; left: 24px; right: 24px; transform: translateY(-50%);
    background: var(--card); border-radius: 28px; padding: 36px 24px;
    text-align: center; box-shadow: var(--shadow-2);
  }
  .perm-icon {
    font-size: 64px; margin-bottom: 12px;
    width: 100px; height: 100px; margin: 0 auto 16px;
    background: var(--primary-soft); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .perm-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
  .perm-desc { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 24px; }
  .countdown-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    z-index: 20; display: flex; align-items: center; justify-content: center;
  }
  .countdown-num {
    font-size: 200px; font-weight: 200; color: #fff; font-family: -apple-system;
    animation: countpop 1s ease infinite;
  }
  @keyframes countpop {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.7; }
  }
  .flash-white {
    position: absolute; inset: 0; background: #fff; z-index: 30; animation: flash 0.2s ease;
  }
  @keyframes flash { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
  .processing-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  .spinner {
    width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.2);
    border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing-text { color: #fff; font-size: 14px; font-weight: 500; }
  .preview-page {
    position: absolute; inset: 0; background: #1a1a1a; z-index: 25;
    display: flex; flex-direction: column;
  }
  .preview-img {
    flex: 1; background: linear-gradient(135deg, #FF8A5B 0%, #F26B5E 50%, #B5447A 100%);
    display: flex; align-items: center; justify-content: center; font-size: 130px;
  }
  .preview-actions { padding: 24px 20px 40px; display: flex; gap: 12px; background: #1a1a1a; }
  .preview-btn {
    flex: 1; padding: 16px; border-radius: var(--radius-btn); border: none;
    font-size: 15px; font-weight: 700; cursor: pointer; min-height: 48px;
  }
  .preview-btn.retake { background: rgba(255,255,255,0.15); color: #fff; }
  .preview-btn.use {
    background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: #fff;
    box-shadow: 0 8px 20px rgba(255,138,91,0.4);
  }
  .snackbar {
    position: absolute; bottom: 30px; left: 16px; right: 16px;
    background: var(--card); padding: 14px 16px; border-radius: 16px;
    box-shadow: var(--shadow-2); z-index: 50;
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    border-left: 4px solid var(--red);
  }
  .snackbar-text { font-size: 14px; font-weight: 500; flex: 1; color: var(--text); }
  .snackbar-btn {
    padding: 8px 14px; background: var(--primary); border: none; color: #fff;
    border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer;
    min-height: 36px; min-width: 48px;
  }
  /* Onboarding */
  .onb-page {
    width: 100%; height: 100%; padding: 60px 32px 50px;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  }
  .onb-skip {
    position: absolute; top: 60px; right: 16px; background: transparent; border: none;
    color: var(--text-2); font-size: 14px; cursor: pointer; padding: 8px 12px;
    min-height: 44px; min-width: 44px; font-weight: 600;
  }
  .onb-hero {
    flex: 1; display: flex; align-items: center; justify-content: center;
    width: 100%;
  }
  .onb-hero-circle {
    width: 240px; height: 240px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 130px;
    box-shadow: var(--shadow-2);
  }
  .onb-hero-circle.p1 { background: linear-gradient(135deg, #FFE4D4, #FFC9AC); }
  .onb-hero-circle.p2 { background: linear-gradient(135deg, #DCE9FB, #B5CDF5); }
  .onb-hero-circle.p3 { background: linear-gradient(135deg, #FFF4DC, #FFD4A8); }
  .onb-content { text-align: center; width: 100%; }
  .onb-title { font-size: 28px; font-weight: 800; margin-bottom: 12px; line-height: 1.3; letter-spacing: -0.5px; }
  .onb-desc { font-size: 15px; color: var(--text-2); line-height: 1.6; margin-bottom: 32px; }
  .onb-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .onb-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--outline-strong); transition: all 0.3s; }
  .onb-dot.active { background: var(--primary); width: 28px; border-radius: 4px; }
  .onb-btn {
    width: 100%; padding: 17px; border-radius: var(--radius-btn);
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    color: #fff; border: none; font-size: 16px; font-weight: 700;
    cursor: pointer; min-height: 48px;
    box-shadow: 0 8px 24px rgba(255,138,91,0.4);
  }
  /* Side panel */
  .panel {
    width: 280px; background: rgba(255,255,255,0.85); backdrop-filter: blur(24px);
    border-radius: 24px; padding: 20px; border: 1px solid var(--outline);
    position: sticky; top: 32px; max-height: calc(100vh - 64px); overflow-y: auto;
    box-shadow: var(--shadow-1);
  }
  .panel-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; color: var(--primary-2); }
  .panel-sub { font-size: 12px; color: var(--text-2); margin-bottom: 16px; }
  .panel-group { margin-bottom: 18px; }
  .group-label {
    font-size: 11px; color: var(--text-2); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .panel-btn {
    width: 100%; padding: 9px 12px; border-radius: 10px; background: var(--bg);
    border: 1px solid var(--outline); color: var(--text); font-size: 13px;
    text-align: left; cursor: pointer; margin-bottom: 4px;
  }
  .panel-btn:hover { background: var(--bg-2); }
  .panel-btn.active {
    background: var(--primary-soft); border-color: var(--primary);
    color: var(--primary-2); font-weight: 700;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SCENES = {
  onboarding: { label: "Onboarding", states: ["1·拍照", "2·洋葱皮", "3·延时"] },
  dashboard: { label: "Dashboard", states: ["空状态", "有数据", "导出 Sheet"] },
  camera: { label: "Camera", states: ["权限请求","未检测人脸","未对齐","已对齐","洋葱皮","倒计时","已拍照","处理中","预览/重拍","权限被拒","存储不足","摄像头被占用"] }
};

function TabBar({ active, onChange }) {
  return (
    <nav className="tab-bar" role="tablist" aria-label="主导航">
      <button className={`tab-item ${active==="dashboard"?"active":""}`} role="tab" aria-selected={active==="dashboard"} onClick={()=>onChange("dashboard")}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Home
      </button>
      <button className={`tab-item ${active==="camera"?"active":""}`} role="tab" aria-selected={active==="camera"} onClick={()=>onChange("camera")}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Camera
      </button>
    </nav>
  );
}

function DashEmpty({ onShoot }) {
  return (
    <div className="dash-page">
      <div className="dash-header">
        <div>
          <div className="dash-greet">早上好 ☀️</div>
          <h1 className="dash-title">DailyPortrait</h1>
        </div>
        <div className="avatar" aria-label="头像">😊</div>
      </div>
      <div className="empty-state">
        <div className="empty-icon" aria-hidden="true">📷</div>
        <p className="empty-text"><strong>还没有记录</strong>从今天开始你的肖像计划</p>
        <button className="cta-primary" onClick={onShoot}>开始今日打卡</button>
      </div>
    </div>
  );
}

function DashFilled({ onExport }) {
  const days = ["一","二","三","四","五","六","日"];
  return (
    <div className="dash-page">
      <div className="dash-header">
        <div>
          <div className="dash-greet">早上好 ☀️</div>
          <h1 className="dash-title">坚持的第 37 天</h1>
        </div>
        <button className="avatar" aria-label="导出视频" onClick={onExport}>📤</button>
      </div>
      <div className="bento">
        <div className="card today-card">
          <div className="today-thumb-placeholder" aria-hidden="true">😊</div>
          <div className="today-info">
            <div className="today-label">今日打卡</div>
            <div className="today-title">5 月 18 日 · 周一</div>
            <span className="today-time">已记录 · 09:24</span>
          </div>
        </div>
        <div className="card streak-card">
          <div className="streak-emoji" aria-hidden="true">🔥</div>
          <div className="streak-num">37</div>
          <div className="streak-label">连续天数</div>
        </div>
        <div className="card week-card">
          <div className="week-title">本周 5/7</div>
          <div className="week-dots">
            {days.map((d,i)=>(
              <div key={i} className={`day-dot ${i<4?"done":""} ${i===4?"today":""}`} aria-label={`周${d}${i<4?" 已打卡":i===4?" 今日":""}`}>
                {i<4 ? "✓" : d}
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="history-section">
        <h2 className="history-title">回忆相册</h2>
        <div className="history-grid">
          {Array.from({length:9}).map((_,i)=>(
            <div key={i} className="hist-item" aria-label={`第 ${30-i} 天`}>
              <span className="hist-date">5/{17-i}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ExportSheet({ onClose }) {
  const [progress, setProgress] = useState(0);
  const [done, setDone] = useState(false);
  useEffect(()=>{
    if (done) return;
    const t = setInterval(()=>{
      setProgress(p => {
        if (p >= 100) { clearInterval(t); setDone(true); return 100; }
        return p + 4;
      });
    }, 80);
    return ()=>clearInterval(t);
  },[done]);
  return (
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()} role="dialog" aria-label="导出视频">
        <div className="sheet-handle" aria-hidden="true" />
        {!done ? (<>
          <h2 className="sheet-title">正在生成延时视频 ✨</h2>
          <p className="sheet-desc">37 天 · 1080p · 24fps</p>
          <div className="progress-track" role="progressbar" aria-valuenow={progress}>
            <div className="progress-fill" style={{width:`${progress}%`}} />
          </div>
          <p className="progress-text">{progress}% · 预计还需 {Math.max(1,Math.ceil((100-progress)/20))}s</p>
        </>) : (<>
          <div className="sheet-done-icon" aria-hidden="true">✓</div>
          <h2 className="sheet-title" style={{textAlign:"center"}}>太棒了 🎉</h2>
          <p className="sheet-desc" style={{textAlign:"center"}}>视频已保存到相册</p>
          <button className="cta-primary" style={{width:"100%",marginTop:16}} onClick={onClose}>完成</button>
        </>)}
      </div>
    </div>
  );
}

function CameraScene({ state }) {
  const [count, setCount] = useState(3);
  useEffect(()=>{
    if (state !== "倒计时") { setCount(3); return; }
    if (count <= 1) return;
    const t = setTimeout(()=>setCount(c=>c-1), 800);
    return ()=>clearTimeout(t);
  },[state, count]);

  if (state === "权限请求") {
    return (<div className="cam-page">
      <div className="perm-card">
        <div className="perm-icon" aria-hidden="true">📷</div>
        <h2 className="perm-title">允许使用相机</h2>
        <p className="perm-desc">DailyPortrait 需要相机权限<br/>来记录你每日的肖像</p>
        <button className="cta-primary" style={{width:"100%"}}>允许访问</button>
      </div>
    </div>);
  }
  if (state === "权限被拒") {
    return (<div className="cam-page">
      <div className="perm-card">
        <div className="perm-icon" aria-hidden="true">🔒</div>
        <h2 className="perm-title">相机权限被拒绝</h2>
        <p className="perm-desc">请前往「设置 → DailyPortrait」<br/>开启相机权限</p>
        <button className="cta-primary" style={{width:"100%"}}>打开设置</button>
      </div>
    </div>);
  }
  if (state === "摄像头被占用") {
    return (<div className="cam-page">
      <div className="perm-card">
        <div className="perm-icon" aria-hidden="true">⚠️</div>
        <h2 className="perm-title">摄像头被占用</h2>
        <p className="perm-desc">请关闭其他正在使用相机的应用<br/>例如 FaceTime / 微信视频</p>
        <button className="cta-primary" style={{width:"100%"}}>重试</button>
      </div>
    </div>);
  }

  const ringClass = state==="未对齐" ? "misaligned" : state==="已对齐" ? "aligned" : "";
  return (<div className="cam-page">
    <div className="cam-viewfinder" aria-hidden="true">
      {state !== "未检测人脸" && <span className="face-mockup">👤</span>}
    </div>
    <div className="cam-topbar">
      <button className="cam-iconbtn" aria-label="关闭">✕</button>
      <button className="cam-iconbtn" aria-label="闪光灯">⚡</button>
    </div>
    {state === "已拍照" && <div className="thumb-corner" aria-hidden="true">😊</div>}
    {state === "洋葱皮" && (<>
      <div className="onion-overlay" aria-hidden="true" />
      <div className="onion-control">
        <div className="onion-row">
          <span className="onion-label">👻 洋葱皮叠加</span>
          <span className="onion-value">60%</span>
        </div>
        <div className="slider-track"><div className="slider-fill"/><div className="slider-thumb"/></div>
      </div>
    </>)}
    {(state === "未检测人脸" || state === "未对齐" || state === "已对齐" || state === "洋葱皮") && (
      <div className={`guide-ring ${ringClass}`} aria-hidden="true">
        {state === "未对齐" && <div className="ring-icon red">✗</div>}
        {state === "已对齐" && <div className="ring-icon green">✓</div>}
      </div>
    )}
    <div className="shutter-row">
      <button className="switch-btn" aria-label="切换摄像头">↻</button>
      <button className="shutter" aria-label="拍照"></button>
      <button className="switch-btn" aria-label="计时器">⏱</button>
    </div>
    {state === "倒计时" && (
      <div className="countdown-overlay">
        <div className="countdown-num" aria-live="assertive">{count}</div>
      </div>
    )}
    {state === "已拍照" && <div className="flash-white" aria-hidden="true" />}
    {state === "处理中" && (
      <div className="processing-overlay" role="status" aria-live="polite">
        <div className="spinner" aria-hidden="true" />
        <span className="processing-text">保存中…</span>
      </div>
    )}
    {state === "预览/重拍" && (
      <div className="preview-page">
        <div className="preview-img" aria-hidden="true">😊</div>
        <div className="preview-actions">
          <button className="preview-btn retake">重拍</button>
          <button className="preview-btn use">使用这张</button>
        </div>
      </div>
    )}
    {state === "存储不足" && (
      <div className="snackbar" role="alert">
        <span className="snackbar-text">存储空间不足，无法保存</span>
        <button className="snackbar-btn">清理空间</button>
      </div>
    )}
  </div>);
}

function Onboarding({ page, onPage, onDone }) {
  const pages = [
    { emoji: "📸", cls: "p1", title: "每天自拍一张", desc: "在固定时间留下一张肖像\n积累属于你的成长档案" },
    { emoji: "👻", cls: "p2", title: "洋葱皮帮你对齐", desc: "上一张照片半透明叠加\n保持构图一致超简单" },
    { emoji: "🎬", cls: "p3", title: "生成延时视频", desc: "365 天的坚持\n变成几十秒的动人短片" }
  ];
  const p = pages[page];
  return (
    <div className="onb-page">
      <button className="onb-skip" onClick={onDone}>跳过</button>
      <div className="onb-hero">
        <div className={`onb-hero-circle ${p.cls}`} aria-hidden="true">{p.emoji}</div>
      </div>
      <div className="onb-content">
        <h1 className="onb-title">{p.title}</h1>
        <p className="onb-desc" style={{whiteSpace:"pre-line"}}>{p.desc}</p>
        <div className="onb-dots" role="tablist" aria-label="引导页">
          {pages.map((_,i)=>(
            <div key={i} className={`onb-dot ${i===page?"active":""}`} role="tab" aria-current={i===page?"true":"false"}/>
          ))}
        </div>
        <button className="onb-btn" onClick={()=> page < 2 ? onPage(page+1) : onDone()}>
          {page < 2 ? "继续 →" : "开始使用"}
        </button>
      </div>
    </div>
  );
}

function App() {
  const [scene, setScene] = useState("onboarding");
  const [onbPage, setOnbPage] = useState(0);
  const [dashState, setDashState] = useState("有数据");
  const [showSheet, setShowSheet] = useState(false);
  const [camState, setCamState] = useState("已对齐");

  useEffect(()=>{
    if (camState !== "已拍照") return;
    const t = setTimeout(()=>setCamState("处理中"), 600);
    return ()=>clearTimeout(t);
  },[camState]);
  useEffect(()=>{
    if (camState !== "处理中") return;
    const t = setTimeout(()=>setCamState("预览/重拍"), 1200);
    return ()=>clearTimeout(t);
  },[camState]);

  const handleDashChange = (s) => {
    setDashState(s);
    setShowSheet(s === "导出 Sheet");
  };

  return (<>
    <div className="phone" role="presentation">
      <div className="notch" />
      <div className="screen">
        {scene === "onboarding" && <Onboarding page={onbPage} onPage={setOnbPage} onDone={()=>setScene("dashboard")}/>}
        {scene === "dashboard" && (<>
          {dashState === "空状态" && <DashEmpty onShoot={()=>setScene("camera")} />}
          {(dashState === "有数据" || dashState === "导出 Sheet") && <DashFilled onExport={()=>{setDashState("导出 Sheet");setShowSheet(true);}} />}
          {showSheet && <ExportSheet onClose={()=>{setShowSheet(false);setDashState("有数据");}}/>}
          <TabBar active="dashboard" onChange={s => setScene(s)}/>
        </>)}
        {scene === "camera" && (<>
          <CameraScene state={camState} />
          <TabBar active="camera" onChange={s => setScene(s)}/>
        </>)}
      </div>
    </div>

    <aside className="panel" aria-label="设计师工具面板">
      <div className="panel-title">☁️ Soft Cloud</div>
      <div className="panel-sub">DailyPortrait Prototype · v1.1</div>

      <div className="panel-group">
        <div className="group-label">场景</div>
        {Object.entries(SCENES).map(([k, v])=>(
          <button key={k} className={`panel-btn ${scene===k?"active":""}`} onClick={()=>setScene(k)}>{v.label}</button>
        ))}
      </div>

      {scene === "onboarding" && (
        <div className="panel-group">
          <div className="group-label">Onboarding 页</div>
          {SCENES.onboarding.states.map((s,i)=>(
            <button key={i} className={`panel-btn ${onbPage===i?"active":""}`} onClick={()=>setOnbPage(i)}>{s}</button>
          ))}
        </div>
      )}

      {scene === "dashboard" && (
        <div className="panel-group">
          <div className="group-label">Dashboard 状态</div>
          {SCENES.dashboard.states.map((s,i)=>(
            <button key={i} className={`panel-btn ${dashState===s?"active":""}`} onClick={()=>handleDashChange(s)}>{s}</button>
          ))}
        </div>
      )}

      {scene === "camera" && (
        <div className="panel-group">
          <div className="group-label">Camera 状态</div>
          {SCENES.camera.states.map((s,i)=>(
            <button key={i} className={`panel-btn ${camState===s?"active":""}`} onClick={()=>setCamState(s)}>{s}</button>
          ))}
        </div>
      )}
    </aside>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
