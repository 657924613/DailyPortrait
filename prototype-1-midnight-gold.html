<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DailyPortrait · Midnight Gold</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #1A1A2E;
    --bg-2: #0F0F1E;
    --card: #252540;
    --card-2: #2D2D4D;
    --gold: #F5A623;
    --gold-soft: rgba(245,166,35,0.15);
    --green: #30D158;
    --red: #FF453A;
    --text: #E5E7EB;
    --text-2: #9CA3AF;
    --outline: rgba(255,255,255,0.1);
    --outline-strong: rgba(255,255,255,0.4);
    --focus-ring: #F5A623;
    --radius-card: 20px;
    --radius-btn: 12px;
    --shadow-1: 0 4px 12px rgba(0,0,0,0.4);
    --shadow-2: 0 12px 32px rgba(0,0,0,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "SF Pro Text", "PingFang SC", system-ui, sans-serif;
    background: linear-gradient(135deg, #0a0a18 0%, #16162a 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px;
    gap: 32px;
  }
  button:focus-visible, [role="button"]:focus-visible, [role="tab"]:focus-visible {
    outline: 2px solid var(--focus-ring);
    outline-offset: 2px;
  }
  /* Phone frame */
  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 48px;
    border: 8px solid #000;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .notch {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 30px; background: #000; border-radius: 18px; z-index: 100;
  }
  .screen { width: 100%; height: 100%; overflow: hidden; position: relative; }
  /* Status bar */
  .status-bar {
    height: 50px; padding: 16px 28px 0; display: flex;
    justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600;
  }
  /* Bottom tab */
  .tab-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 84px;
    background: rgba(15,15,30,0.85); backdrop-filter: blur(20px);
    border-top: 1px solid var(--outline);
    display: flex; padding: 8px 24px 24px;
  }
  .tab-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px; border: none; background: transparent; cursor: pointer; border-radius: 12px;
    color: var(--text-2); font-size: 11px; font-weight: 500;
  }
  .tab-item.active { color: var(--gold); }
  .tab-item svg { width: 24px; height: 24px; }
  /* ============ Dashboard ============ */
  .dash-page { padding: 60px 20px 100px; height: 100%; overflow-y: auto; }
  .dash-header { padding: 10px 0 16px; display: flex; justify-content: space-between; align-items: center; }
  .dash-title { font-size: 24px; font-weight: 700; }
  .export-btn {
    padding: 8px 14px; border-radius: 999px; background: var(--gold-soft);
    color: var(--gold); border: 1px solid var(--gold); font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 80px 20px; text-align: center; gap: 20px;
  }
  .empty-icon {
    width: 96px; height: 96px; border-radius: 50%; background: var(--card);
    display: flex; align-items: center; justify-content: center; font-size: 40px;
    border: 2px dashed var(--outline-strong);
  }
  .empty-text { font-size: 16px; color: var(--text-2); line-height: 1.5; }
  .cta-primary {
    padding: 16px 32px; border-radius: var(--radius-btn); border: none;
    background: var(--gold); color: #000; font-size: 16px; font-weight: 700; cursor: pointer;
    box-shadow: 0 8px 20px rgba(245,166,35,0.3); min-height: 48px; min-width: 48px;
  }
  /* Bento grid */
  .bento { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .card {
    background: var(--card); border-radius: var(--radius-card); padding: 16px;
    border: 1px solid var(--outline);
  }
  .today-card {
    grid-column: span 2; padding: 20px; display: flex; gap: 16px; align-items: center;
    background: linear-gradient(135deg, var(--card) 0%, var(--card-2) 100%);
  }
  .today-thumb-placeholder {
    width: 88px; height: 88px; border-radius: 16px;
    background: linear-gradient(135deg, var(--gold) 0%, #d8941a 100%);
    display: flex; align-items: center; justify-content: center; font-size: 36px; flex-shrink: 0;
  }
  .today-info { flex: 1; }
  .today-label { font-size: 13px; color: var(--text-2); margin-bottom: 4px; }
  .today-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .today-time { font-size: 13px; color: var(--gold); font-weight: 500; }
  .streak-card { display: flex; flex-direction: column; align-items: center; padding: 20px 16px; }
  .streak-emoji { font-size: 32px; margin-bottom: 8px; }
  .streak-num { font-size: 28px; font-weight: 700; color: var(--gold); line-height: 1; }
  .streak-label { font-size: 11px; color: var(--text-2); margin-top: 6px; }
  .week-card { padding: 18px 16px; }
  .week-title { font-size: 13px; color: var(--text-2); margin-bottom: 12px; font-weight: 500; }
  .week-dots { display: flex; justify-content: space-between; }
  .day-dot {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500;
    border: 1.5px solid var(--outline);
  }
  .day-dot.done { background: var(--gold); color: #000; border-color: var(--gold); }
  .day-dot.today { border: 2px solid var(--gold); color: var(--gold); }
  .history-section { margin-top: 20px; }
  .history-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .history-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .hist-item {
    aspect-ratio: 1; border-radius: 12px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, var(--card) 0%, var(--card-2) 100%);
    display: flex; align-items: flex-end; padding: 6px;
  }
  .hist-item:nth-child(3n+1) { background: linear-gradient(135deg, #3a2d4a, #2a1f38); }
  .hist-item:nth-child(3n+2) { background: linear-gradient(135deg, #2a3848, #1f2a38); }
  .hist-item:nth-child(3n+3) { background: linear-gradient(135deg, #4a3528, #38271a); }
  .hist-date {
    font-size: 10px; color: rgba(255,255,255,0.85); padding: 3px 6px;
    background: rgba(0,0,0,0.4); border-radius: 6px; backdrop-filter: blur(4px);
  }
  /* Export sheet */
  .sheet-backdrop {
    position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
    display: flex; align-items: flex-end;
  }
  .sheet {
    width: 100%; background: var(--card); border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px; box-shadow: var(--shadow-2);
  }
  .sheet-handle {
    width: 40px; height: 4px; background: var(--outline-strong); border-radius: 2px;
    margin: 0 auto 20px;
  }
  .sheet-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .sheet-desc { font-size: 14px; color: var(--text-2); margin-bottom: 24px; }
  .progress-track { height: 8px; background: var(--bg-2); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
  .progress-fill { height: 100%; background: var(--gold); transition: width 0.3s; }
  .progress-text { font-size: 13px; color: var(--text-2); margin-bottom: 20px; }
  .sheet-done-icon {
    width: 64px; height: 64px; border-radius: 50%; background: var(--green);
    display: flex; align-items: center; justify-content: center; font-size: 32px; color: #000;
    margin: 0 auto 16px;
  }
  /* ============ Camera ============ */
  .cam-page { width: 100%; height: 100%; background: #000; position: relative; overflow: hidden; }
  .cam-viewfinder {
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, #1a1a2e 0%, #050510 100%);
  }
  .face-mockup {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 120px; opacity: 0.25;
  }
  .guide-ring {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 280px; height: 360px; border-radius: 50%;
    border: 3px dashed var(--outline-strong);
  }
  .guide-ring.misaligned { border: 4px solid var(--red); border-style: solid; }
  .guide-ring.aligned { border: 4px solid var(--green); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(48,209,88,0.6); }
    50% { box-shadow: 0 0 0 18px rgba(48,209,88,0); }
  }
  .ring-icon {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700;
  }
  .ring-icon.red { background: var(--red); color: #fff; }
  .ring-icon.green { background: var(--green); color: #000; }
  /* Onion skin */
  .onion-overlay {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 280px; height: 360px; border-radius: 50%;
    background: radial-gradient(circle, rgba(245,166,35,0.5) 0%, rgba(245,166,35,0.1) 70%);
    opacity: 0.6;
    filter: blur(2px);
  }
  .onion-control {
    position: absolute; bottom: 200px; left: 20px; right: 20px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); padding: 14px 18px;
    border-radius: 16px; border: 1px solid var(--outline);
  }
  .onion-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .onion-label { font-size: 13px; font-weight: 500; }
  .onion-value { font-size: 13px; color: var(--gold); font-weight: 600; }
  .slider-track { height: 4px; background: var(--outline); border-radius: 2px; position: relative; }
  .slider-fill { height: 100%; background: var(--gold); border-radius: 2px; width: 60%; }
  .slider-thumb {
    position: absolute; top: 50%; left: 60%; transform: translate(-50%, -50%);
    width: 18px; height: 18px; border-radius: 50%; background: var(--gold);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  /* Top bar in camera */
  .cam-topbar {
    position: absolute; top: 50px; left: 0; right: 0; padding: 12px 20px;
    display: flex; justify-content: space-between; align-items: center; z-index: 10;
  }
  .cam-iconbtn {
    width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px); border: none; color: #fff; font-size: 18px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .cam-iconbtn.flash {
    width: 44px; height: 44px;
    /* hit area 44, visual is the inner icon */
  }
  .thumb-corner {
    position: absolute; top: 50px; right: 16px; width: 56px; height: 56px;
    border-radius: 12px; border: 2px solid #fff; overflow: hidden; z-index: 10;
    background: linear-gradient(135deg, var(--gold), #d8941a);
    display: flex; align-items: center; justify-content: center; font-size: 24px;
    animation: thumbpop 0.4s ease;
  }
  @keyframes thumbpop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  /* Shutter */
  .shutter-row {
    position: absolute; bottom: 100px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: center; gap: 60px;
  }
  .shutter {
    width: 76px; height: 76px; border-radius: 50%;
    background: var(--gold); border: 4px solid #fff;
    cursor: pointer; box-shadow: 0 0 0 4px rgba(245,166,35,0.3);
    min-width: 48px; min-height: 48px;
  }
  .shutter:active { transform: scale(0.95); }
  .switch-btn {
    width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.15);
    border: none; color: #fff; font-size: 22px; cursor: pointer;
  }
  /* States */
  .perm-card {
    position: absolute; top: 50%; left: 20px; right: 20px; transform: translateY(-50%);
    background: var(--card); border-radius: var(--radius-card); padding: 32px 24px;
    text-align: center; border: 1px solid var(--outline);
  }
  .perm-icon { font-size: 56px; margin-bottom: 16px; }
  .perm-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .perm-desc { font-size: 14px; color: var(--text-2); line-height: 1.6; margin-bottom: 24px; }
  .countdown-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 20;
    display: flex; align-items: center; justify-content: center;
  }
  .countdown-num {
    font-size: 180px; font-weight: 200; color: var(--gold); font-family: -apple-system;
    animation: countpop 1s ease infinite;
  }
  @keyframes countpop {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.7; }
  }
  .flash-white {
    position: absolute; inset: 0; background: #fff; z-index: 30; animation: flash 0.2s ease;
  }
  @keyframes flash { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
  .processing-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  .spinner {
    width: 48px; height: 48px; border: 3px solid rgba(245,166,35,0.2);
    border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .preview-page {
    position: absolute; inset: 0; background: #000; z-index: 25;
    display: flex; flex-direction: column;
  }
  .preview-img {
    flex: 1; background: linear-gradient(135deg, #f5a623 0%, #d8941a 50%, #8a5e15 100%);
    display: flex; align-items: center; justify-content: center; font-size: 120px;
  }
  .preview-actions {
    padding: 24px 20px 48px; display: flex; gap: 12px; background: #000;
  }
  .preview-btn {
    flex: 1; padding: 16px; border-radius: var(--radius-btn); border: none;
    font-size: 15px; font-weight: 700; cursor: pointer; min-height: 48px;
  }
  .preview-btn.retake { background: rgba(255,255,255,0.15); color: #fff; }
  .preview-btn.use { background: var(--gold); color: #000; }
  .snackbar {
    position: absolute; bottom: 110px; left: 16px; right: 16px;
    background: var(--red); color: #fff; padding: 14px 16px; border-radius: 12px;
    box-shadow: var(--shadow-2); z-index: 50;
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .snackbar-text { font-size: 14px; font-weight: 500; flex: 1; }
  .snackbar-btn {
    padding: 6px 14px; background: rgba(255,255,255,0.2); border: none;
    color: #fff; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
    min-height: 32px; min-width: 48px;
  }
  /* ============ Onboarding ============ */
  .onb-page {
    width: 100%; height: 100%; padding: 60px 32px 60px;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  }
  .onb-skip {
    position: absolute; top: 60px; right: 24px; background: transparent; border: none;
    color: var(--text-2); font-size: 14px; cursor: pointer; padding: 8px 12px;
    min-height: 44px; min-width: 44px;
  }
  .onb-hero {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 140px;
  }
  .onb-content { text-align: center; }
  .onb-title { font-size: 26px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
  .onb-desc { font-size: 15px; color: var(--text-2); line-height: 1.6; margin-bottom: 32px; padding: 0 8px; }
  .onb-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .onb-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--outline-strong); transition: all 0.3s; }
  .onb-dot.active { background: var(--gold); width: 24px; border-radius: 4px; }
  .onb-btn {
    width: 100%; padding: 16px; border-radius: var(--radius-btn);
    background: var(--gold); color: #000; border: none; font-size: 16px; font-weight: 700;
    cursor: pointer; min-height: 48px;
  }

  /* ============ Side panel (Designer Tool) ============ */
  .panel {
    width: 280px; background: rgba(20,20,40,0.6); backdrop-filter: blur(24px);
    border-radius: 20px; padding: 20px; border: 1px solid var(--outline);
    position: sticky; top: 32px; max-height: calc(100vh - 64px); overflow-y: auto;
  }
  .panel-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: var(--gold); }
  .panel-sub { font-size: 12px; color: var(--text-2); margin-bottom: 16px; }
  .panel-group { margin-bottom: 18px; }
  .group-label {
    font-size: 11px; color: var(--text-2); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
  }
  .panel-btn {
    width: 100%; padding: 9px 12px; border-radius: 8px; background: var(--card);
    border: 1px solid var(--outline); color: var(--text); font-size: 13px;
    text-align: left; cursor: pointer; margin-bottom: 4px; transition: all 0.15s;
  }
  .panel-btn:hover { background: var(--card-2); }
  .panel-btn.active {
    background: var(--gold-soft); border-color: var(--gold); color: var(--gold); font-weight: 600;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SCENES = {
  onboarding: { label: "Onboarding", states: ["1·拍照", "2·洋葱皮", "3·延时"] },
  dashboard: { label: "Dashboard", states: ["空状态", "有数据", "导出 Sheet"] },
  camera: { label: "Camera", states: ["权限请求","未检测人脸","未对齐","已对齐","洋葱皮","倒计时","已拍照","处理中","预览/重拍","权限被拒","存储不足","摄像头被占用"] }
};

function StatusBar() {
  return (
    <div className="status-bar" aria-hidden="true">
      <span>9:41</span>
      <span style={{display:"flex",gap:6,fontSize:13}}>
        <span>●●●●</span><span>📶</span><span>🔋</span>
      </span>
    </div>
  );
}

function TabBar({ active, onChange }) {
  return (
    <nav className="tab-bar" role="tablist" aria-label="主导航">
      <button className={`tab-item ${active==="dashboard"?"active":""}`} role="tab" aria-selected={active==="dashboard"} onClick={()=>onChange("dashboard")}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </button>
      <button className={`tab-item ${active==="camera"?"active":""}`} role="tab" aria-selected={active==="camera"} onClick={()=>onChange("camera")}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Camera
      </button>
    </nav>
  );
}

/* ============ Dashboard ============ */
function DashEmpty({ onShoot }) {
  return (
    <div className="dash-page">
      <div className="dash-header"><h1 className="dash-title">DailyPortrait</h1></div>
      <div className="empty-state">
        <div className="empty-icon" aria-hidden="true">📷</div>
        <p className="empty-text">还没有记录<br/>从今天开始你的肖像计划</p>
        <button className="cta-primary" onClick={onShoot}>开始今日打卡</button>
      </div>
    </div>
  );
}
function DashFilled({ onExport }) {
  const days = ["一","二","三","四","五","六","日"];
  return (
    <div className="dash-page">
      <div className="dash-header">
        <h1 className="dash-title">DailyPortrait</h1>
        <button className="export-btn" onClick={onExport}>导出视频</button>
      </div>
      <div className="bento">
        <div className="card today-card">
          <div className="today-thumb-placeholder" aria-hidden="true">😊</div>
          <div className="today-info">
            <div className="today-label">今日打卡</div>
            <div className="today-title">5 月 18 日 · 周一</div>
            <div className="today-time">已记录 · 09:24</div>
          </div>
        </div>
        <div className="card streak-card">
          <div className="streak-emoji" aria-hidden="true">🔥</div>
          <div className="streak-num">37</div>
          <div className="streak-label">连续天数</div>
        </div>
        <div className="card week-card">
          <div className="week-title">本周进度 5/7</div>
          <div className="week-dots">
            {days.map((d,i)=>(
              <div key={i} className={`day-dot ${i<4?"done":""} ${i===4?"today":""}`} aria-label={`周${d}${i<4?" 已打卡":i===4?" 今日":""}`}>
                {i<4 ? "✓" : d}
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="history-section">
        <h2 className="history-title">历史</h2>
        <div className="history-grid">
          {Array.from({length:9}).map((_,i)=>(
            <div key={i} className="hist-item" aria-label={`第 ${30-i} 天记录`}>
              <span className="hist-date">5/{17-i}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
function ExportSheet({ onClose }) {
  const [progress, setProgress] = useState(0);
  const [done, setDone] = useState(false);
  useEffect(()=>{
    if (done) return;
    const t = setInterval(()=>{
      setProgress(p => {
        if (p >= 100) { clearInterval(t); setDone(true); return 100; }
        return p + 4;
      });
    }, 80);
    return ()=>clearInterval(t);
  },[done]);
  return (
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()} role="dialog" aria-label="导出视频">
        <div className="sheet-handle" aria-hidden="true" />
        {!done ? (<>
          <h2 className="sheet-title">正在生成延时视频</h2>
          <p className="sheet-desc">37 天 · 1080p · 24fps</p>
          <div className="progress-track" role="progressbar" aria-valuenow={progress} aria-valuemin="0" aria-valuemax="100">
            <div className="progress-fill" style={{width:`${progress}%`}} />
          </div>
          <p className="progress-text">{progress}% · 预计还需 {Math.max(1,Math.ceil((100-progress)/20))}s</p>
        </>) : (<>
          <div className="sheet-done-icon" aria-hidden="true">✓</div>
          <h2 className="sheet-title" style={{textAlign:"center"}}>导出成功</h2>
          <p className="sheet-desc" style={{textAlign:"center"}}>已保存到相册</p>
          <button className="cta-primary" style={{width:"100%",marginTop:16}} onClick={onClose}>完成</button>
        </>)}
      </div>
    </div>
  );
}

/* ============ Camera ============ */
function CameraScene({ state }) {
  const [count, setCount] = useState(3);
  useEffect(()=>{
    if (state !== "倒计时") { setCount(3); return; }
    if (count <= 1) return;
    const t = setTimeout(()=>setCount(c=>c-1), 800);
    return ()=>clearTimeout(t);
  },[state, count]);

  if (state === "权限请求") {
    return (<div className="cam-page">
      <div className="perm-card">
        <div className="perm-icon" aria-hidden="true">📷</div>
        <h2 className="perm-title">允许使用相机</h2>
        <p className="perm-desc">DailyPortrait 需要相机权限<br/>来记录你每日的肖像</p>
        <button className="cta-primary" style={{width:"100%"}}>允许访问</button>
      </div>
    </div>);
  }
  if (state === "权限被拒") {
    return (<div className="cam-page">
      <div className="perm-card">
        <div className="perm-icon" aria-hidden="true">🔒</div>
        <h2 className="perm-title">相机权限被拒绝</h2>
        <p className="perm-desc">请前往「设置 → DailyPortrait」<br/>开启相机权限</p>
        <button className="cta-primary" style={{width:"100%"}}>打开设置</button>
      </div>
    </div>);
  }
  if (state === "摄像头被占用") {
    return (<div className="cam-page">
      <div className="perm-card">
        <div className="perm-icon" aria-hidden="true">⚠️</div>
        <h2 className="perm-title">摄像头被占用</h2>
        <p className="perm-desc">请关闭其他正在使用相机的应用<br/>例如 FaceTime / 微信视频</p>
        <button className="cta-primary" style={{width:"100%"}}>重试</button>
      </div>
    </div>);
  }

  const ringClass = state==="未对齐" ? "misaligned" : state==="已对齐" ? "aligned" : "";
  return (<div className="cam-page">
    <div className="cam-viewfinder" aria-hidden="true">
      {state !== "未检测人脸" && <span className="face-mockup">👤</span>}
    </div>
    <div className="cam-topbar">
      <button className="cam-iconbtn" aria-label="关闭">✕</button>
      <button className="cam-iconbtn flash" aria-label="闪光灯">⚡</button>
    </div>
    {state === "已拍照" && <div className="thumb-corner" aria-hidden="true">😊</div>}
    {state === "洋葱皮" && (<>
      <div className="onion-overlay" aria-hidden="true" />
      <div className="onion-control">
        <div className="onion-row">
          <span className="onion-label">洋葱皮叠加</span>
          <span className="onion-value">60%</span>
        </div>
        <div className="slider-track"><div className="slider-fill"/><div className="slider-thumb"/></div>
      </div>
    </>)}
    {(state === "未检测人脸" || state === "未对齐" || state === "已对齐" || state === "洋葱皮") && (
      <div className={`guide-ring ${ringClass}`} aria-hidden="true">
        {state === "未对齐" && <div className="ring-icon red">✗</div>}
        {state === "已对齐" && <div className="ring-icon green">✓</div>}
      </div>
    )}
    <div className="shutter-row">
      <button className="switch-btn" aria-label="切换前后摄像头">↻</button>
      <button className="shutter" aria-label="拍照"></button>
      <button className="switch-btn" aria-label="计时器">⏱</button>
    </div>
    {state === "倒计时" && (
      <div className="countdown-overlay">
        <div className="countdown-num" aria-live="assertive">{count}</div>
      </div>
    )}
    {state === "已拍照" && <div className="flash-white" aria-hidden="true" />}
    {state === "处理中" && (
      <div className="processing-overlay" role="status" aria-live="polite">
        <div className="spinner" aria-hidden="true" />
        <span style={{fontSize:14,fontWeight:500}}>保存中…</span>
      </div>
    )}
    {state === "预览/重拍" && (
      <div className="preview-page">
        <div className="preview-img" aria-hidden="true">😊</div>
        <div className="preview-actions">
          <button className="preview-btn retake">重拍</button>
          <button className="preview-btn use">使用这张</button>
        </div>
      </div>
    )}
    {state === "存储不足" && (
      <div className="snackbar" role="alert">
        <span className="snackbar-text">存储空间不足，无法保存</span>
        <button className="snackbar-btn">清理空间</button>
      </div>
    )}
  </div>);
}

/* ============ Onboarding ============ */
function Onboarding({ page, onPage, onDone }) {
  const pages = [
    { emoji: "📸", title: "每天自拍一张", desc: "在固定时间留下一张肖像\n积累属于你的成长档案" },
    { emoji: "👻", title: "洋葱皮帮你对齐", desc: "上一张照片半透明叠加\n保持构图一致超简单" },
    { emoji: "🎬", title: "生成延时视频", desc: "365 天的坚持\n变成几十秒的动人短片" }
  ];
  const p = pages[page];
  return (
    <div className="onb-page">
      <button className="onb-skip" onClick={onDone}>跳过</button>
      <div className="onb-hero" aria-hidden="true">{p.emoji}</div>
      <div className="onb-content">
        <h1 className="onb-title">{p.title}</h1>
        <p className="onb-desc" style={{whiteSpace:"pre-line"}}>{p.desc}</p>
        <div className="onb-dots" role="tablist" aria-label="引导页">
          {pages.map((_,i)=>(
            <div key={i} className={`onb-dot ${i===page?"active":""}`} role="tab" aria-current={i===page?"true":"false"}/>
          ))}
        </div>
        <button className="onb-btn" onClick={()=> page < 2 ? onPage(page+1) : onDone()}>
          {page < 2 ? "继续" : "开始使用"}
        </button>
      </div>
    </div>
  );
}

/* ============ App ============ */
function App() {
  const [scene, setScene] = useState("onboarding");
  const [onbPage, setOnbPage] = useState(0);
  const [dashState, setDashState] = useState("有数据");
  const [showSheet, setShowSheet] = useState(false);
  const [camState, setCamState] = useState("已对齐");

  // Auto progress for shot taken -> processing -> preview
  useEffect(()=>{
    if (camState !== "已拍照") return;
    const t = setTimeout(()=>setCamState("处理中"), 600);
    return ()=>clearTimeout(t);
  },[camState]);
  useEffect(()=>{
    if (camState !== "处理中") return;
    const t = setTimeout(()=>setCamState("预览/重拍"), 1200);
    return ()=>clearTimeout(t);
  },[camState]);

  const handleDashChange = (s) => {
    setDashState(s);
    setShowSheet(s === "导出 Sheet");
  };

  return (<>
    <div className="phone" role="presentation">
      <div className="notch" />
      <div className="screen">
        {scene === "onboarding" && <Onboarding page={onbPage} onPage={setOnbPage} onDone={()=>setScene("dashboard")}/>}
        {scene === "dashboard" && (<>
          {dashState === "空状态" && <DashEmpty onShoot={()=>setScene("camera")} />}
          {(dashState === "有数据" || dashState === "导出 Sheet") && <DashFilled onExport={()=>{setDashState("导出 Sheet");setShowSheet(true);}} />}
          {showSheet && <ExportSheet onClose={()=>{setShowSheet(false);setDashState("有数据");}}/>}
          <TabBar active="dashboard" onChange={s => setScene(s)}/>
        </>)}
        {scene === "camera" && (<>
          <CameraScene state={camState} />
          <TabBar active="camera" onChange={s => setScene(s)}/>
        </>)}
      </div>
    </div>

    <aside className="panel" aria-label="设计师工具面板">
      <div className="panel-title">🌙 Midnight Gold</div>
      <div className="panel-sub">DailyPortrait Prototype · v1.1</div>

      <div className="panel-group">
        <div className="group-label">场景</div>
        {Object.entries(SCENES).map(([k, v])=>(
          <button key={k} className={`panel-btn ${scene===k?"active":""}`} onClick={()=>setScene(k)}>{v.label}</button>
        ))}
      </div>

      {scene === "onboarding" && (
        <div className="panel-group">
          <div className="group-label">Onboarding 页</div>
          {SCENES.onboarding.states.map((s,i)=>(
            <button key={i} className={`panel-btn ${onbPage===i?"active":""}`} onClick={()=>setOnbPage(i)}>{s}</button>
          ))}
        </div>
      )}

      {scene === "dashboard" && (
        <div className="panel-group">
          <div className="group-label">Dashboard 状态</div>
          {SCENES.dashboard.states.map((s,i)=>(
            <button key={i} className={`panel-btn ${dashState===s?"active":""}`} onClick={()=>handleDashChange(s)}>{s}</button>
          ))}
        </div>
      )}

      {scene === "camera" && (
        <div className="panel-group">
          <div className="group-label">Camera 状态</div>
          {SCENES.camera.states.map((s,i)=>(
            <button key={i} className={`panel-btn ${camState===s?"active":""}`} onClick={()=>setCamState(s)}>{s}</button>
          ))}
        </div>
      )}
    </aside>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
